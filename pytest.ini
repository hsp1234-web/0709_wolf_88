[pytest]
# PYTHONPATH 設定，指向專案根目錄
pythonpath = .

# 測試報告與追蹤格式優化
# -ra: report all except normal passes (useful for seeing skips, xfails)
# --tb=short: shorter tracebacks
# --color=yes: colorized output
# -v: verbose (added here for explicitness, though often used from CLI)
# -l: show local variables in tracebacks
addopts = -v -l --tb=short -ra --color=yes

# -- Pytest Doctest
doctest_optionflags = NORMALIZE_WHITESPACE IGNORE_EXCEPTION_DETAIL NUMBER

# -- Logging options:
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# -- Markers:
markers =
    live: 實彈測試，會對外部服務發起真實請求。
    asyncio: for asyncio marker

# 其他選項保持註解狀態，按需啟用
# durations = 0
# -x
# log_file = .pytest_logs/pytest.log
# filterwarnings =
#     ignore::DeprecationWarning
# cov = .
# cov_report = term-missing
