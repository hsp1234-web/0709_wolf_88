# ==============================================================================
# 專案組態設定檔 (v2.0)
# 說明：集中管理所有需要靈活調整的參數與 API 金鑰。
# ==============================================================================

# --- API 金鑰管理 ---
# 警告：請勿將真實金鑰直接提交到版本控制系統。
# 建議將此檔案加入 .gitignore，並在部署環境中手動創建或透過 CI/CD 注入。
api_keys:
  # 請在此處填入您的 FRED API 金鑰
  fred: "c85a224a0e0d72a7bccb471c0021eb7b"

  # 其他未來可能用到的金鑰
  fmp: "YOUR_REAL_FMP_API_KEY_HERE" # <-- 在此處新增您的 FMP 金鑰
  finmind: "YOUR_REAL_FINMIND_API_TOKEN_HERE" # <-- 在此處新增您的 FinMind Token

# --- 資料庫設定 ---
database:
  main_db_path: "prometheus_fire.duckdb"
  # 新增任務佇列資料庫的路徑設定
  task_queue_db_path: "output/task_queue.db"

# --- 數據獲取設定 ---
data_acquisition:
  # 重試次數
  retries: 3
  # 重試間隔 (秒)
  retry_backoff: 2
