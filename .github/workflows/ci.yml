# ==============================================================================
#  【普羅米修斯之火】持續整合工作流 (v1.0)
#  由 uv 驅動，確保所有提交的程式碼都符合品質標準
# ==============================================================================

name: "Prometheus Fire CI"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"] # 鎖定專案的目標 Python 版本

    steps:
      - name: 1. 簽出程式碼 (Checkout Code)
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 3. 安裝 uv (Install uv)
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: 4. 建立虛擬環境並安裝依賴 (Create venv & Install Dependencies)
        run: |
          uv venv
          uv pip install -e .[dev]

      - name: 5. 執行 Linter 與 Formatter 檢查 (Run Linter & Formatter)
        run: |
          echo "--- 執行 Ruff Linter ---"
          uv run ruff check .
          echo "--- 執行 Ruff Formatter ---"
          uv run ruff format --check .

      - name: 6. 執行自動化測試 (Run Automated Tests)
        run: uv run pytest -v
